apiVersion: v1
kind: Pod
metadata:
  name: postgres-with-startup
spec:
  containers:
    - name: postgres
      image: postgres:17
      env:
        - name: POSTGRES_PASSWORD   # Required — image won't start without it
          value: "demo-password"
        - name: POSTGRES_DB
          value: "demodb"
      ports:
        - containerPort: 5432
      startupProbe:
        tcpSocket:
          port: 5432               # Check if PostgreSQL accepting TCP
        failureThreshold: 12       # 12 × 5s = 60s budget to start
        periodSeconds: 5
        # Blocks liveness + readiness until passes
        # Passes once, then stops forever

      readinessProbe:
        exec:
          command:
            - pg_isready            # PostgreSQL built-in health check
            - -U
            - postgres
        initialDelaySeconds: 0     # Safe — startup passed first
        periodSeconds: 10
        failureThreshold: 3

      livenessProbe:
        exec:
          command:
            - pg_isready
            - -U
            - postgres
        initialDelaySeconds: 0     # Safe — startup passed first
        periodSeconds: 20
        failureThreshold: 3

      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
