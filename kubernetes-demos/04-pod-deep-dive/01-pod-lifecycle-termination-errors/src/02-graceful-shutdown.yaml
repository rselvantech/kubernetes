apiVersion: v1
kind: Pod
metadata:
  name: graceful-shutdown-demo
spec:
  terminationGracePeriodSeconds: 40    # Override default 30s — app needs up to 35s
  containers:
    - name: payment-service
      image: busybox:1.36
      lifecycle:
        preStop:
          exec:
            command: ["/bin/sh", "-c", "echo 'Draining connections...'; sleep 5"]
            # preStop fires BEFORE SIGTERM
            # Gives load balancer 5s to stop routing new requests here
            # Then SIGTERM is sent for the actual application shutdown
      command:
        - /bin/sh
        - -c
        - |
          trap 'echo SIGTERM received. Shutting down...; sleep 3; echo Shutdown complete; exit 0' TERM
          echo "Payment service started"
          while true; do sleep 1; done
