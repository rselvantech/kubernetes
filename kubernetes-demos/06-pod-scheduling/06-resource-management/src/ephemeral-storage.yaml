apiVersion: v1
kind: Pod
metadata:
  name: ephemeral-demo
spec:
  terminationGracePeriodSeconds: 0
  containers:
    - name: app
      image: busybox
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
          ephemeral-storage: "512Mi"   # scheduler reserves 512Mi disk
        limits:
          cpu: "200m"
          memory: "128Mi"
          ephemeral-storage: "1Gi"     # ceiling: 1Gi disk usage
