apiVersion: v1
kind: Pod
metadata:
  name: pod-level-demo
spec:
  terminationGracePeriodSeconds: 0
  resources:               # ← pod-level resources (v1.34 beta)
    requests:
      cpu: "300m"
      memory: "128Mi"
    limits:
      cpu: "600m"
      memory: "256Mi"
  containers:
    - name: app
      image: busybox
      command: ["sh", "-c", "sleep 3600"]
      # No container-level resources — pod-level applies
    - name: sidecar
      image: busybox
      command: ["sh", "-c", "sleep 3600"]
      # Pod-level budget shared across both containers
