apiVersion: v1
kind: LimitRange
metadata:
  name: resource-limits
  namespace: default
spec:
  limits:
    - type: Container
      default:             # injected as limit when none set
        cpu: "500m"
        memory: "256Mi"
      defaultRequest:      # injected as request when none set
        cpu: "100m"
        memory: "128Mi"
      max:                 # container limit must be ≤ max
        cpu: "2"
        memory: "1Gi"
      min:                 # container request must be ≥ min
        cpu: "50m"
        memory: "32Mi"