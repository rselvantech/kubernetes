apiVersion: v1
kind: Pod
metadata:
  name: limit-only-demo
spec:
  terminationGracePeriodSeconds: 0
  containers:
    - name: app
      image: busybox
      command: ["sh", "-c", "sleep 3600"]
      resources:
        limits:
          cpu: "500m"
          memory: "128Mi"
        # No requests section — Kubernetes will copy limits to requests
