apiVersion: apps/v1
kind: Deployment
metadata:
  name: plain-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: plain-app
  template:
    metadata:
      labels:
        app: plain-app
    spec:
      tolerations:
        - key: "maintenance"
          operator: "Equal"
          value: "true"
          effect: "NoExecute"
          tolerationSeconds: 30   # Tolerated for 30s, then evicted
      containers:
        - name: busybox
          image: busybox
          command: ["sh", "-c", "sleep 3600"]
