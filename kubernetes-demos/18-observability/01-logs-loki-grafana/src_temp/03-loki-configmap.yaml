apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
  labels:
    app: loki
data:
  loki.yaml: |
    # ── Auth ──────────────────────────────────────────────────────────
    # false = single-tenant mode (all logs in one "fake" tenant)
    # true  = multi-tenant mode — each tenant isolated by X-Scope-OrgID header
    auth_enabled: false

    # ── Server ────────────────────────────────────────────────────────
    server:
      http_listen_port: 3100     # Fluent Bit sends here; Grafana queries here
      grpc_listen_port: 9096     # Internal component communication

    # ── Common settings shared across components ──────────────────────
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki         # Root path for all Loki data on disk (mounted from PVC)
      storage:
        filesystem:
          chunks_directory: /loki/chunks   # Compressed log chunks (the actual log data)
          rules_directory:  /loki/rules    # Alert rules (not used in this lab)
      replication_factor: 1
      # replication_factor: 1 = no replication
      # Production HA: set to 3 with multiple Ingester replicas
      ring:
        kvstore:
          store: inmemory
          # inmemory: single-instance coordination (monolithic mode only)
          # Production: memberlist (gossip protocol) or etcd/consul

    # ── Query performance ─────────────────────────────────────────────
    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100    # Cache LogQL query results in memory
                                # Avoids re-scanning chunks for repeated queries

    # ── Schema configuration ──────────────────────────────────────────
    # Defines how Loki stores and indexes data over time.
    # Multiple configs support migration between schema versions.
    schema_config:
      configs:
        - from: 2024-01-01       # Apply this config to logs from this date
          store: tsdb            # Index backend: tsdb (required for Loki 3.x)
                                 # Older: boltdb-shipper (deprecated in Loki 3.x)
          object_store: filesystem
          schema: v13            # Current label schema — always use latest
                                 # v13 added structured_metadata support
          index:
            prefix: index_       # Prefix for index file names
            period: 24h          # New index file every 24 hours
                                 # Matches compactor's default working window

    # ── Rate and stream limits ────────────────────────────────────────
    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h   # Reject logs older than 7 days
                                          # Prevents accidental historical backfills
      allow_structured_metadata: true    # Enable Fluent Bit structured_metadata field
                                          # Used for high-cardinality values like pod names

    # ── Table management ──────────────────────────────────────────────
    table_manager:
      retention_deletes_enabled: false   # Set to true to enable log retention/deletion
      retention_period: 0s               # 0 = no retention (keep forever)
                                          # Production: set to e.g. 720h (30 days)

    # ── Ruler (alerting) ─────────────────────────────────────────────
    ruler:
      alertmanager_url: http://localhost/
      # Placeholder — Alertmanager not deployed in this lab
      # Production: point to your Alertmanager service

    # ── Usage analytics ──────────────────────────────────────────────
    analytics:
      reporting_enabled: false   # Disable usage reporting to Grafana Labs
