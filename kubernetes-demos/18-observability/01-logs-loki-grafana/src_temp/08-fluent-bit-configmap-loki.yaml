apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: default
  labels:
    app: fluent-bit
data:
  # This ConfigMap replaces the one from 03-daemonset-logging-agent.
  # The only change from the lab 03 version is the [OUTPUT] block:
  #   Before: stdout (prints JSON to Fluent Bit container's own stdout)
  #   After:  loki   (ships enriched records to Loki in monitoring namespace)
  #
  # After applying: kubectl rollout restart daemonset/fluent-bit
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  /fluent-bit/etc/parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    # ── INPUT ──────────────────────────────────────────────────────────
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # ── FILTER ─────────────────────────────────────────────────────────
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    # ── OUTPUT — Loki ──────────────────────────────────────────────────
    # This block replaces [OUTPUT] Name stdout from Lab 03.
    # Uses the official built-in Loki output plugin (not the deprecated grafana-loki plugin).
    # Reference: https://docs.fluentbit.io/manual/data-pipeline/outputs/loki
    [OUTPUT]
        Name   loki
        Match  *

        # Loki endpoint — in-cluster DNS resolves to the Loki ClusterIP Service
        Host   loki.monitoring.svc.cluster.local
        Port   3100

        # Stream labels — indexed in Loki, used in LogQL stream selectors.
        # LOW CARDINALITY values only here (not pod names, which are high cardinality).
        # cluster=3node is the multi-cluster key — change per minikube profile.
        # $kubernetes['namespace_name'] extracts from the Kubernetes filter enrichment.
        Labels job=fluent-bit, cluster=3node, namespace=$kubernetes['namespace_name'], app=$kubernetes['labels']['app']

        # Structured metadata — attached to individual log entries, NOT indexed.
        # Use for high-cardinality values: pod names, container names.
        # Loki 3.x feature (schema v13 required — configured in loki-config).
        Structured_Metadata pod=$kubernetes['pod_name'], container=$kubernetes['container_name']

        # Automatically add Kubernetes labels (app, component, etc.) as Loki stream labels.
        # Use with caution: adds all pod labels — can cause label cardinality issues
        # if pods have many unique labels. Set to Off and use Labels above for control.
        Auto_Kubernetes_Labels off

        # TLS: disabled for in-cluster HTTP (no TLS termination on ClusterIP)
        # Production with TLS: tls on, tls.verify on
        tls        off
        tls.verify off

        # Retry on failure — Loki may be temporarily unavailable
        Retry_Limit 5
