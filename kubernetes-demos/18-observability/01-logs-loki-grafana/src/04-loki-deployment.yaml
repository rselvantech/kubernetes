---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: monitoring
  labels:
    app: loki
    version: "3.7.1"
spec:
  replicas: 1                  # Monolithic mode: single replica
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      securityContext:
        fsGroup: 10001          # Volume ownership for /loki mount
        runAsUser: 10001
        runAsGroup: 10001
        runAsNonRoot: true
      containers:
        - name: loki
          image: grafana/loki:3.7.1
          args:
            - -config.file=/etc/loki/loki.yaml
            - -target=all       # monolithic: run all components in this pod
          ports:
            - name: http
              containerPort: 3100    # Fluent Bit pushes here; Grafana queries here
            - name: grpc
              containerPort: 9096    # Internal component communication
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/loki/loki.yaml
              subPath: loki.yaml      # Mount only the config key
            - name: storage
              mountPath: /loki        # PVC mounted here — chunks and index live here
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: storage
          persistentVolumeClaim:
            claimName: loki-storage
---
# ClusterIP Service — Fluent Bit and Grafana reach Loki via in-cluster DNS:
#   loki.monitoring.svc.cluster.local:3100
# No NodePort needed — Grafana proxies all queries (access: proxy)
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monitoring
  labels:
    app: loki
spec:
  type: ClusterIP
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
    - name: grpc
      port: 9096
      targetPort: 9096
