---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
    version: "12.4.2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472        # Grafana's default GID
        runAsUser: 472
        runAsGroup: 472
        runAsNonRoot: true
      initContainers:
        # Copy dashboard JSON to the directory Grafana reads at startup.
        # emptyDir volume shared between initContainer and main container.
        - name: copy-dashboards
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /var/lib/grafana/dashboards
              cp /tmp/dashboards/kubernetes-logs.json /var/lib/grafana/dashboards/
              echo "Dashboards copied"
          volumeMounts:
            - name: dashboard-source
              mountPath: /tmp/dashboards
            - name: dashboard-target
              mountPath: /var/lib/grafana/dashboards
          securityContext:
            runAsUser: 0
      containers:
        - name: grafana
          image: grafana/grafana:12.4.2
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
              # Production: use a Secret instead of plain-text env var
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_LOG_LEVEL
              value: warn
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provisioner
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-target
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
            items:
              - key: datasources.yaml
                path: datasources.yaml
        - name: dashboard-provisioner
          configMap:
            name: grafana-dashboard-kubernetes-logs
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: dashboard-source
          configMap:
            name: grafana-dashboard-kubernetes-logs
            items:
              - key: kubernetes-logs.json
                path: kubernetes-logs.json
        - name: dashboard-target
          emptyDir: {}
---
# NodePort Service — browser access at http://<minikube-ip>:30300
# Production: use LoadBalancer or Ingress instead of NodePort
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
