# Let's Encrypt Staging ClusterIssuer
#
# Use staging first to verify DNS-01 + IRSA + Route53 all work correctly.
# Staging has high rate limits — safe for testing and configuration iteration.
# Staging certificates are NOT trusted by browsers (fake root CA).
#
# Workflow:
#   1. Apply this file → verify ClusterIssuer READY = True
#   2. Apply certificate-staging.yaml → verify Certificate READY = True
#   3. Only then proceed to clusterissuer-production.yaml
# ---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # Let's Encrypt staging ACME server
    server: https://acme-staging-v02.api.letsencrypt.org/directory

    # Email for Let's Encrypt account — used for expiry notifications
    # Replace with your actual email
    email: your@email.com

    # Kubernetes Secret where the ACME account private key is stored.
    # cert-manager creates this Secret automatically on first registration.
    # Do not create this Secret manually.
    privateKeySecretRef:
      name: letsencrypt-staging-account-key

    solvers:
      - dns01:
          route53:
            # AWS region where Route53 changes are submitted
            # Route53 is a global service but requires a region for the API client
            region: us-east-2

            # Hosted zone ID for rselvantech.com
            # cert-manager creates _acme-challenge TXT records in this zone
            # Get with: aws route53 list-hosted-zones-by-name --dns-name rselvantech.com
            hostedZoneID: Z0098351FHZVOKGD40KE
