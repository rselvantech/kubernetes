# Let's Encrypt Production ClusterIssuer
#
# Only apply after staging certificate is READY = True.
# Production certificates are trusted by all browsers.
# Production has strict rate limits: 50 certs/domain/week, 5 failures/hour.
# ---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    # Let's Encrypt production ACME server
    server: https://acme-v02.api.letsencrypt.org/directory

    # Email for Let's Encrypt account — used for expiry notifications
    # Replace with your actual email
    email: your@email.com

    # Kubernetes Secret where the ACME account private key is stored.
    # cert-manager creates this automatically on first registration.
    # Separate from staging key — each ACME server has its own account.
    privateKeySecretRef:
      name: letsencrypt-production-account-key

    solvers:
      - dns01:
          route53:
            region: us-east-2

            # Hosted zone ID for rselvantech.com
            # Get with: aws route53 list-hosted-zones-by-name --dns-name rselvantech.com
            hostedZoneID: Z0098351FHZVOKGD40KE
