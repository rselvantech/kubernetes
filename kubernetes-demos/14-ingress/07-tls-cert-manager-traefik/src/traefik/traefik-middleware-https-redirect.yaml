# Traefik HTTP → HTTPS Redirect Middleware
#
# Applied to all HTTP (port 80) IngressRoutes to redirect traffic to HTTPS.
# Middleware lives in traefik namespace and is referenced by IngressRoutes
# in otel-demo namespace using the cross-namespace format:
#   middlewares:
#     - name: https-redirect
#       namespace: traefik
#
# Traefik equivalent of ALB's ssl-redirect: "443" annotation (Demo-06)
# ---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
#  namespace: traefik
  namespace: otel-demo   # ← Same namespace as IngressRoutes
spec:
  redirectScheme:
    scheme: https
    permanent: true    # HTTP 301 Moved Permanently
