apiVersion: batch/v1
kind: CronJob
metadata:
  name: demo-cronjob-deadline
  namespace: lifetime-demo
spec:
  schedule: "*/1 * * * *"           # Every minute
  completionDeadlineSeconds: 20     # Each spawned Job must finish in 20s
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: worker
              image: busybox
              command: ["sh", "-c", "echo 'Running...'; sleep 60"]
