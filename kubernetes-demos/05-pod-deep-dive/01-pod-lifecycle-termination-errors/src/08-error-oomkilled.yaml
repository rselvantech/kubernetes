apiVersion: v1
kind: Pod
metadata:
  name: oomkilled-demo
spec:
  restartPolicy: Always
  containers:
    - name: memory-hog
      image: polinux/stress          # Official stress tool image — used in K8s docs
      command: ["stress"]
      args:
        - --vm                       # Start 1 virtual memory worker
        - "1"
        - --vm-bytes                 # Worker allocates 20MB — well above the 10Mi limit
        - "20M"
        - --vm-hang                  # Hold the allocation (don't free and reallocate)
        - "60"                       # Hold for 60 seconds — enough time to observe OOMKill
      resources:
        requests:
          memory: "5Mi"
          cpu: "50m"
        limits:
          memory: "10Mi"             # Hard cap at 10Mi — stress tries 20M → OOMKilled
          cpu: "100m"
