apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ds-nodeselector
spec:
  selector:
    matchLabels:
      app: ds-nodeselector
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: ds-nodeselector
    spec:
      nodeSelector:
        disktype: ssd        # Only nodes with this label receive a pod
      containers:
        - name: nginx
          image: nginx:1.27
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
