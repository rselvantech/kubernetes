apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ds-affinity-preferred
spec:
  selector:
    matchLabels:
      app: ds-affinity-preferred
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: ds-affinity-preferred
    spec:
      affinity:
        nodeAffinity:
          # No required rule — pod can go on ANY node
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80                     # High preference
              preference:
                matchExpressions:
                  - key: disktype
                    operator: In
                    values: [ssd, nvme]      # Prefer SSD or NVMe nodes

            - weight: 20                     # Lower preference
              preference:
                matchExpressions:
                  - key: zone
                    operator: In
                    values: [us-east-1a]     # Also prefer us-east-1a zone
      containers:
        - name: nginx
          image: nginx:1.27
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
