apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ds-taint-toleration
spec:
  selector:
    matchLabels:
      app: ds-taint-toleration
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: ds-taint-toleration
    spec:
      tolerations:
        # Tolerate the gpu taint on 3node-m03
        - key: dedicated
          operator: Equal
          value: gpu
          effect: NoSchedule

        # Also tolerate the control-plane taint
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nginx
          image: nginx:1.27
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
