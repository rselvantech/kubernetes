apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: blue-app
  template:
    metadata:
      labels:
        app: blue-app
    spec:
      terminationGracePeriodSeconds: 0
      # Toleration — permits this pod onto the blue tainted node
      tolerations:
        - key: "team"
          operator: "Equal"
          value: "blue"
          effect: "NoSchedule"
      # Node Affinity — attracts this pod strictly to the blue node
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: team
                    operator: In
                    values:
                      - blue
      containers:
        - name: app
          image: busybox
          command: ["sh", "-c", "sleep 3600"]