apiVersion: v1
kind: Pod
metadata:
  name: qos-guaranteed
spec:
  terminationGracePeriodSeconds: 0
  containers:
    - name: app
      image: busybox
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          cpu: "200m"
          memory: "128Mi"
        limits:
          cpu: "200m"       # requests == limits for CPU
          memory: "128Mi"   # requests == limits for memory → Guaranteed
