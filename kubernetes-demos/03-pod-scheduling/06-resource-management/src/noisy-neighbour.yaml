apiVersion: apps/v1
kind: Deployment
metadata:
  name: well-behaved
spec:
  replicas: 2
  selector:
    matchLabels:
      app: well-behaved
  template:
    metadata:
      labels:
        app: well-behaved
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: app
          image: busybox
          command: ["sh", "-c", "sleep 3600"]
          # No resources section — no requests, no limits
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noisy-neighbour
spec:
  replicas: 2
  selector:
    matchLabels:
      app: noisy-neighbour
  template:
    metadata:
      labels:
        app: noisy-neighbour
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: app
          image: polinux/stress
          command: ["stress"]
          args: ["--vm", "1", "--vm-bytes", "512M", "--vm-hang", "1"]
          # No limits — free to consume as much as available
