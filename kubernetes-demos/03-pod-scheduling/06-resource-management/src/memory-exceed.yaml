apiVersion: v1
kind: Pod
metadata:
  name: memory-exceed
spec:
  terminationGracePeriodSeconds: 0
  containers:
    - name: memory-stress
      image: polinux/stress
      resources:
        requests:
          memory: "100Mi"
        limits:
          memory: "200Mi"     # ceiling: 200Mi
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "250M", "--vm-hang", "1"]
      # load: 250M — EXCEEDS the 200Mi limit
