apiVersion: v1
kind: Pod
metadata:
  name: cpu-demo
spec:
  terminationGracePeriodSeconds: 0
  containers:
    - name: cpu-stress
      image: polinux/stress
      resources:
        requests:
          cpu: "250m"
        limits:
          cpu: "500m"       # ceiling: 0.5 CPU
      command: ["stress"]
      args: ["--cpu", "2"]  # tries to use 2 full CPUs
