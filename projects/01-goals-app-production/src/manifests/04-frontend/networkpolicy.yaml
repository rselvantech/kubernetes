apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-network-policy
  namespace: goals-production
spec:
  podSelector:
    matchLabels:
      app: goals-frontend
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow: Traefik namespace → frontend port 3000
    # Traefik pods are in the traefik namespace — selected by namespaceSelector
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 3000

  egress:
    # Allow: frontend → backend port 80 (nginx proxy_pass for /goals)
    - to:
        - podSelector:
            matchLabels:
              app: goals-backend
      ports:
        - port: 80
    # Allow: frontend → kube-dns port 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
